server:
  port: 8095

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000, http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # --- 1. Auth Service ---
        - id: auth-service-route
          uri: http://localhost:8090
          predicates:
            - Path=/api/auth/**, /api/admin/**
            
        # --- 2. Ruta para la Documentacion (Auth Service) ---
        - id: auth-docs-route
          uri: http://localhost:8090
          predicates:
            - Path=/api-docs-auth
          filters:
            - RewritePath=/api-docs-auth, /api-docs

# --- Configuracion Interfaz Swagger ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Microservicio de Autenticación y Usuarios (myplans_auth)
        url: /api-docs-auth